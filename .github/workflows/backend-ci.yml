# ── RDAT Copilot — Backend CI ──────────────────────────────────────
#
# Lints and tests the FastAPI backend on push/PR.
# Does NOT deploy (backend runs locally via Docker or uvicorn).
#
# Phase 3: CI/CD & Deployment

name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: ruff check app/ --output-format=github

      - name: Check formatting
        run: ruff format --check app/

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short || echo "No tests found yet — skipping"
        env:
          RDAT_DB_PATH: ":memory:"
